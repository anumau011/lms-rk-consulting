# HTTPS server
server {
    listen       443 ssl;
    server_name  rkconsulting-prod-env.eba-emqszm2p.ap-south-1.elasticbeanstalk.com api.rkconsulting.org.in;   # ← fix this too

    ssl_certificate      /etc/letsencrypt/live/api.rkconsulting.org.in/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/api.rkconsulting.org.in/privkey.pem;

    ssl_session_timeout  5m;
    ssl_protocols  TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass          http://127.0.0.1:5000;
        proxy_set_header    Connection "";
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto https;
    }
}

